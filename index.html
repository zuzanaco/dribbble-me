<body>
  <div class="w">
    <div class="bar" aria-label="Layout options">
      <div class="control">
        <label class="lbl" for="bg-color-select">Background</label>
        <select class="sel" id="bg-color-select"></select>
      </div>
      <div class="control">
        <label class="lbl" for="device-color-select">Device</label>
        <select class="sel" id="device-color-select"></select>
      </div>
      <div class="control control-wide">
        <label class="lbl" for="layout-select">Layout</label>
        <select class="sel" id="layout-select"></select>
      </div>
      <div class="control">
        <label class="lbl" for="frame-select">Frame</label>
        <select class="sel" id="frame-select"></select>
      </div>
    </div>

    <div class="canvas-view" id="canvas-view">
      <div class="canvas" id="canvas">
        <div id="grid-background"></div>
        <div class="stage" id="stage"></div>
      </div>
    </div>

    <div class="foot">
      <button class="b export" id="exportBtn">Export Image</button>
    </div>
  </div>

  <input type="file" id="fi" accept="image/*" style="display:none">

  <div id="modal">
    <div class="modal-c">
      <button class="modal-close-x" id="modal-close" aria-label="Close preview">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"></path>
        </svg>
      </button>
      <h3>Export Ready!</h3>
      <img id="modal-img" src="" alt="Dribbble Shot Preview">
      <div class="modal-hint">Right-click the image above and select "Save Image As..." if the download didn't start.</div>
      <div class="modal-btns">
        <button class="b export" id="copyBtn">Copy to Clipboard</button>
        <button class="b export" id="modal-dl">Download Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
